name: Watermark Video Pipeline - With Vault

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: watermark-video-pipeline
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      class_date_list:
        description: 'Comma-separated list of class dates (YYYYMMDD, leave blank for today)'
        required: false
      refresh_attendance:
        description: 'Refresh attendance only (skips video). Blank date = scan back refresh_lookback_days.'
        type: boolean
        default: false
      refresh_lookback_days:
        description: 'Days to scan back when refresh_attendance is ON and date is blank'
        required: false
        default: '30'
      refresh_batches:
        description: 'Batches to refresh, comma-separated (blank = all). Only used when refresh_attendance is ON.'
        required: false
      s3_delete_original:
        type: boolean
        default: false
      delete_attendance:
        type: boolean
        default: false
      delete_class:
        type: boolean
        default: false
      s3_delete_watermark:
        type: boolean
        default: false
      use_s3_original:
        type: boolean
        default: false
      vemio_delete:
        type: boolean
        default: false

  schedule:
    # UTC. 05:30/06:30/07:30/08:30 UTC = 11:00/12:00/13:00/14:00 IST, Mon-Sat
    - cron: "30 5-8 * * 1-6"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      batch_matrix: ${{ steps.set-matrix.outputs.batch_matrix }}
      refresh_dates: ${{ steps.set-matrix.outputs.refresh_dates }}

    steps:
      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: devopscalendar101/wv_source
          token: ${{ secrets.PAT }}
          path: wv_source

      - name: Generate matrix from batch config
        id: set-matrix
        run: |
          set +x
          CONFIG=$(cat wv_source/conf/config.json)
          BATCHES=$(echo "$CONFIG" | jq -c '[.batches[] | select(.enabled == true)]')

          if [ -n "${{ github.event.inputs.class_date_list }}" ]; then
            CLASS_DATES="${{ github.event.inputs.class_date_list }}"
          else
            CLASS_DATES=$(date -u +%Y%m%d)
          fi

          # Only batch_name and class_date travel in the matrix. GitHub renders
          # the matrix context in the world-readable "Set up job" log, so the
          # zoom/course/batch IDs are resolved inside the job instead.
          MATRIX=$(jq -n -c \
            --argjson batches "$BATCHES" \
            --arg dates "$CLASS_DATES" \
            '{
              include: [
                $batches[] as $batch |
                ($dates | split(",") | .[] | gsub("^\\s+|\\s+$";"")) as $date |
                {
                  batch_name: $batch.batch_name,
                  class_date: $date
                }
              ]
            }')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

          # ── Attendance refresh: one job per batch, dates looped inside ──
          # Expanding the matrix by date too would blow past the 256-job cap
          # and re-install Vault/ffmpeg for every single day.
          #
          # Only batch_name travels in the matrix: GitHub renders the matrix
          # context in the "Set up job" log, which is world-readable here, so
          # the zoom/course/batch IDs are looked up inside the job instead.
          # refresh_batches narrows the refresh to specific batches; blank
          # means all. This affects ONLY the refresh job -- the daily
          # scheduled video+attendance run above always covers every batch.
          SEL_BATCHES="$BATCHES"
          if [ -n "${{ github.event.inputs.refresh_batches }}" ]; then
            SEL_BATCHES=$(jq -n -c \
              --argjson b "$BATCHES" \
              --arg s "${{ github.event.inputs.refresh_batches }}" \
              '($s | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))) as $names
               | [$b[] | select(.batch_name as $n | any($names[]; . == $n))]')

            WANTED=$(echo "${{ github.event.inputs.refresh_batches }}" | tr ',' '\n' | grep -c '[^[:space:]]')
            GOT=$(echo "$SEL_BATCHES" | jq 'length')
            echo "Refresh batch filter: $GOT of $WANTED requested batch(es) matched"

            if [ "$GOT" -eq 0 ]; then
              echo "::error::No enabled batch matched refresh_batches - check the names against config"
              exit 1
            fi
            if [ "$GOT" -lt "$WANTED" ]; then
              echo "::warning::$((WANTED - GOT)) requested batch(es) did not match an enabled batch"
            fi
          fi

          BATCH_MATRIX=$(jq -n -c --argjson batches "$SEL_BATCHES" \
            '{include: [$batches[] | {batch_name}]}')
          echo "batch_matrix=$BATCH_MATRIX" >> $GITHUB_OUTPUT

          if [ -n "${{ github.event.inputs.class_date_list }}" ]; then
            REFRESH_DATES="$CLASS_DATES"
          else
            LOOKBACK="${{ github.event.inputs.refresh_lookback_days || '30' }}"
            case "$LOOKBACK" in
              ''|*[!0-9]*) LOOKBACK=30 ;;
            esac
            [ "$LOOKBACK" -lt 1 ] && LOOKBACK=1
            [ "$LOOKBACK" -gt 180 ] && LOOKBACK=180
            REFRESH_DATES=$(for i in $(seq 0 $((LOOKBACK - 1))); do
              date -u -d "-$i day" +%Y%m%d
            done | paste -sd, -)
          fi
          echo "refresh_dates=$REFRESH_DATES" >> $GITHUB_OUTPUT

  process-videos:
    needs: prepare-matrix
    if: ${{ github.event.inputs.refresh_attendance != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    name: "${{ matrix.batch_name }}_${{ matrix.class_date }}"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout private source repo
      uses: actions/checkout@v4
      with:
        repository: devopscalendar101/wv_source
        token: ${{ secrets.PAT }}
        path: wv_source

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ hashFiles('wv_source/conf/requirements.txt') }}

    - name: Install Vault CLI and PostgreSQL
      run: |
        set +x
        wget -qO- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list > /dev/null
        sudo apt-get update -qq && sudo apt-get install -y -qq vault postgresql-client

    - name: Setup Environment
      run: |
        set +x
        chmod +x wv_source/bin/bootstrap.sh
        wv_source/bin/bootstrap.sh install
        python3 -m pip install --upgrade pip -q
        python3 -m pip install -r wv_source/conf/requirements.txt -q
        chmod +x wv_source/bin/*

    - name: Retrieve Vault Credentials
      env:
        VAULT_ADDR: ${{ secrets.VAULT_URL }}
        SERVICE_TOKEN: ${{ secrets.SERVICE_TOKEN }}
        ITD_TOKEN: ${{ secrets.ITD_TOKEN }}
      run: bash wv_source/bin/vault_fetch.sh

    - name: Download watermark assets from S3
      run: |
        set +x
        # shellcheck disable=SC1091
        source "$RUNNER_TEMP/.creds.env"

        WM_DIR="$HOME/.watermark-assets"
        mkdir -p "$WM_DIR"
        aws s3 cp s3://class-recordings-itdefined/watermark-assets/ "$WM_DIR/" --recursive --quiet
        echo "Assets downloaded:"
        ls -lh "$WM_DIR/"
        # Non-secret env exports only
        echo "WM_PATH=$WM_DIR" >> $GITHUB_ENV
        echo "PATH=$GITHUB_WORKSPACE/wv_source/bin:$PATH" >> $GITHUB_ENV

    - name: Resolve batch config
      run: |
        set +x
        # IDs come from the private config and are masked before anything can
        # reach this world-readable log; nothing identifying is echoed.
        B=$(jq -c --arg n "${{ matrix.batch_name }}" \
              '.batches[] | select(.batch_name == $n)' wv_source/conf/config.json)
        if [ -z "$B" ]; then
          echo "::error::Batch not found in config"
          exit 1
        fi

        # Masking values shorter than 4 chars would make GitHub redact that
        # character everywhere and shred the log, so only mask the long ones.
        for k in course_id itd_zoom_id batch_id zoom_id zoom_account parent_topic; do
          v=$(echo "$B" | jq -r --arg k "$k" '.[$k]')
          [ "${#v}" -ge 4 ] && echo "::add-mask::$v"
          echo "BATCH_${k}=$v" >> $GITHUB_ENV
        done

        ZA=$(echo "$B" | jq -r '.zoom_account')
        case "$ZA" in
          Z1) ZOOM_EMAIL="itdefined.org@gmail.com" ;;
          Z2) ZOOM_EMAIL="itdefined.org2@gmail.com" ;;
          Z3) ZOOM_EMAIL="itdefined.org3@gmail.com" ;;
          Z4) ZOOM_EMAIL="itdefined.org4@gmail.com" ;;
          *)  ZOOM_EMAIL="unknown@gmail.com" ;;
        esac
        echo "::add-mask::$ZOOM_EMAIL"
        echo "BATCH_zoom_email=$ZOOM_EMAIL" >> $GITHUB_ENV
        echo "Batch config resolved"

    - name: Generate topic from date
      id: topic
      run: |
        set +x
        DATE="${{ matrix.class_date }}"
        YEAR="${DATE:0:4}"
        MONTH="${DATE:4:2}"
        DAY="${DATE:6:2}"
        TOPIC="Topic ${YEAR}-${MONTH}-${DAY}"
        echo "topic=$TOPIC" >> $GITHUB_OUTPUT

    - name: Pipeline Options Check
      run: |
        set +x
        S3_DEL_ORIG="${{ github.event.inputs.s3_delete_original || 'false' }}"
        S3_DEL_WM="${{ github.event.inputs.s3_delete_watermark || 'false' }}"
        VEMIO_DEL="${{ github.event.inputs.vemio_delete || 'false' }}"
        USE_S3="${{ github.event.inputs.use_s3_original || 'false' }}"
        DEL_ATT="${{ github.event.inputs.delete_attendance || 'false' }}"

        icon() { [[ "$1" == "true" ]] && echo "ON" || echo "OFF"; }

        echo "Pipeline options:"
        printf "  use_s3_original     : %s\n" "$(icon $USE_S3)"
        printf "  s3_delete_original  : %s\n" "$(icon $S3_DEL_ORIG)"
        printf "  s3_delete_watermark : %s\n" "$(icon $S3_DEL_WM)"
        printf "  vemio_delete        : %s\n" "$(icon $VEMIO_DEL)"
        printf "  delete_attendance   : %s\n" "$(icon $DEL_ATT)"

        ACTIVE=0
        [[ "$S3_DEL_ORIG" == "true" ]] && ACTIVE=$((ACTIVE+1))
        [[ "$S3_DEL_WM"   == "true" ]] && ACTIVE=$((ACTIVE+1))
        [[ "$VEMIO_DEL"   == "true" ]] && ACTIVE=$((ACTIVE+1))
        [[ "$DEL_ATT"     == "true" ]] && ACTIVE=$((ACTIVE+1))
        if [[ $ACTIVE -ge 3 ]]; then
          echo "::warning::$ACTIVE delete flags active — this will re-process most of the pipeline"
        fi
        if [[ "$S3_DEL_ORIG" == "true" && "$USE_S3" == "true" ]]; then
          echo "::warning::s3_delete_original + use_s3_original both ON — will delete then try to download from same bucket"
        fi

    - name: Run Watermark Video Pipeline
      id: pipeline
      run: |
        set +x
        # shellcheck disable=SC1091
        source "$RUNNER_TEMP/.creds.env"
        set +e
        wv_source/bin/watermark_pipeline.sh \
          "class-recordings-itdefined" \
          "${{ matrix.batch_name }}" \
          "$BATCH_itd_zoom_id" \
          "$BATCH_zoom_account" \
          "${{ steps.topic.outputs.topic }}" \
          "$BATCH_course_id" \
          "$BATCH_batch_id" \
          "$BATCH_parent_topic" \
          "$BATCH_zoom_id" \
          "$BATCH_zoom_email" \
          "${{ matrix.class_date }}" \
          "${{ github.event.inputs.s3_delete_original || 'false' }}" \
          "${{ github.event.inputs.delete_attendance || 'false' }}" \
          "${{ github.event.inputs.delete_class || 'false' }}" \
          "${{ github.event.inputs.s3_delete_watermark || 'false' }}" \
          "${{ github.event.inputs.use_s3_original || 'false' }}" \
          "$VIMEO_ACCESS_TOKEN" \
          "$VIMEO_CLIENT_ID" \
          "$VIMEO_CLIENT_SECRET" \
          "${{ github.event.inputs.vemio_delete || 'false' }}"
        PIPELINE_EXIT=$?
        if [ $PIPELINE_EXIT -eq 2 ]; then
          echo "::warning::No video available for ${{ matrix.batch_name }} on ${{ matrix.class_date }} (no class or Zoom still processing)"
          echo "status=warning" >> $GITHUB_OUTPUT
        elif [ $PIPELINE_EXIT -ne 0 ]; then
          echo "::error::Pipeline failed for ${{ matrix.batch_name }} on ${{ matrix.class_date }}"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "status=success" >> $GITHUB_OUTPUT
        fi

    - name: Upload artifacts (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.batch_name }}-${{ matrix.class_date }}
        path: |
          ~/.tmp/${{ matrix.batch_name }}/*.log
          ~/.tmp/${{ matrix.batch_name }}/*.txt
        retention-days: 7
        if-no-files-found: ignore

    - name: Cleanup local videos
      if: always()
      run: rm -rf ~/.tmp/${{ matrix.batch_name }}/*.mp4 || true

    - name: Cleanup credentials
      if: always()
      run: |
        set +x
        CREDS_FILE="$RUNNER_TEMP/.creds.env"
        if [ -f "$CREDS_FILE" ]; then
          shred -vfz -n 3 "$CREDS_FILE" 2>/dev/null || rm -f "$CREDS_FILE" || true
        fi

  # ─────────────────────────────────────────────
  # Attendance refresh (no video processing)
  # ─────────────────────────────────────────────
  refresh-attendance:
    needs: prepare-matrix
    if: ${{ github.event.inputs.refresh_attendance == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.batch_matrix) }}

    name: "attendance_${{ matrix.batch_name }}"

    env:
      # Public repo: participant emails/names and internal IDs stay out of logs.
      PUBLIC_LOG: 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout private source repo
      uses: actions/checkout@v4
      with:
        repository: devopscalendar101/wv_source
        token: ${{ secrets.PAT }}
        path: wv_source

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ hashFiles('wv_source/conf/requirements.txt') }}

    - name: Install Vault CLI and PostgreSQL
      run: |
        set +x
        wget -qO- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list > /dev/null
        sudo apt-get update -qq && sudo apt-get install -y -qq vault postgresql-client

    - name: Setup Environment
      run: |
        set +x
        chmod +x wv_source/bin/bootstrap.sh
        python3 -m pip install --upgrade pip -q
        python3 -m pip install -r wv_source/conf/requirements.txt -q
        chmod +x wv_source/bin/*
        echo "PATH=$GITHUB_WORKSPACE/wv_source/bin:$PATH" >> $GITHUB_ENV

    - name: Retrieve Vault Credentials
      env:
        VAULT_ADDR: ${{ secrets.VAULT_URL }}
        SERVICE_TOKEN: ${{ secrets.SERVICE_TOKEN }}
        ITD_TOKEN: ${{ secrets.ITD_TOKEN }}
      run: bash wv_source/bin/vault_fetch.sh

    - name: Resolve batch config
      run: |
        set +x
        # Read the IDs from the private config and mask them before they can
        # reach the log; nothing identifying is echoed.
        B=$(jq -c --arg n "${{ matrix.batch_name }}" \
              '.batches[] | select(.batch_name == $n)' wv_source/conf/config.json)
        if [ -z "$B" ]; then
          echo "::error::Batch not found in config"
          exit 1
        fi

        # Masking values shorter than 4 chars would make GitHub redact that
        # character everywhere and shred the log, so only mask the long ones.
        # Short IDs are simply never echoed.
        for k in course_id itd_zoom_id batch_id zoom_id zoom_account parent_topic; do
          v=$(echo "$B" | jq -r --arg k "$k" '.[$k]')
          [ "${#v}" -ge 4 ] && echo "::add-mask::$v"
          echo "BATCH_${k}=$v" >> $GITHUB_ENV
        done

        ZA=$(echo "$B" | jq -r '.zoom_account')
        case "$ZA" in
          Z1) ZOOM_EMAIL="itdefined.org@gmail.com" ;;
          Z2) ZOOM_EMAIL="itdefined.org2@gmail.com" ;;
          Z3) ZOOM_EMAIL="itdefined.org3@gmail.com" ;;
          Z4) ZOOM_EMAIL="itdefined.org4@gmail.com" ;;
          *)  ZOOM_EMAIL="unknown@gmail.com" ;;
        esac
        echo "::add-mask::$ZOOM_EMAIL"
        echo "BATCH_zoom_email=$ZOOM_EMAIL" >> $GITHUB_ENV
        echo "Batch config resolved"

    - name: Refresh attendance for each date
      run: |
        set +x
        # shellcheck disable=SC1091
        source "$RUNNER_TEMP/.creds.env"

        DATES="${{ needs.prepare-matrix.outputs.refresh_dates }}"
        DEL_ATT="${{ github.event.inputs.delete_attendance || 'false' }}"

        if [ "$DEL_ATT" = "true" ]; then
          echo "Mode: FORCE REPAIR - existing attendance will be deleted and re-uploaded"
        else
          echo "Mode: FILL GAPS - dates that already have attendance are skipped"
        fi
        echo "Batch: ${{ matrix.batch_name }}"
        echo "Dates to scan: $(echo "$DATES" | tr ',' '\n' | grep -c .)"
        echo ""

        ok=0; skipped=0; failed=0
        IFS=',' read -ra DATE_ARR <<< "$DATES"
        for d in "${DATE_ARR[@]}"; do
          d=$(echo "$d" | tr -d '[:space:]')
          [ -z "$d" ] && continue

          set +e
          wv_source/bin/watermark_pipeline.sh \
            "class-recordings-itdefined" \
            "${{ matrix.batch_name }}" \
            "$BATCH_itd_zoom_id" \
            "$BATCH_zoom_account" \
            "Topic ${d:0:4}-${d:4:2}-${d:6:2}" \
            "$BATCH_course_id" \
            "$BATCH_batch_id" \
            "$BATCH_parent_topic" \
            "$BATCH_zoom_id" \
            "$BATCH_zoom_email" \
            "$d" \
            "false" "$DEL_ATT" "false" "false" "false" \
            "" "" "" "false" \
            "true"
          rc=$?
          set -e

          if [ $rc -eq 0 ]; then ok=$((ok+1)); else failed=$((failed+1)); fi
        done

        echo ""
        echo "==================================================="
        echo "Attendance refresh summary: ${{ matrix.batch_name }}"
        echo "  dates processed : $ok"
        echo "  dates failed    : $failed"
        echo "==================================================="

        if [ $failed -gt 0 ]; then
          echo "::warning::$failed date(s) failed for ${{ matrix.batch_name }}"
        fi

    - name: Cleanup credentials
      if: always()
      run: |
        set +x
        CREDS_FILE="$RUNNER_TEMP/.creds.env"
        if [ -f "$CREDS_FILE" ]; then
          shred -vfz -n 3 "$CREDS_FILE" 2>/dev/null || rm -f "$CREDS_FILE" || true
        fi
