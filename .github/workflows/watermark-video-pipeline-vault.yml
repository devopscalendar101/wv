name: Watermark Video Pipeline - With Vault

# Security: Minimal workflow permissions
permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: watermark-video-pipeline
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      class_date_list:
        description: 'Comma-separated list of class dates (YYYYMMDD, leave blank for today)'
        required: false
      s3_delete_original:
        type: boolean
        default: false
      delete_attendance:
        type: boolean
        default: false
      delete_class:
        type: boolean
        default: false
      s3_delete_watermark:
        type: boolean
        default: false
      use_s3_original:
        type: boolean
        default: false
      vemio_delete:
        type: boolean
        default: false

  schedule:
    - cron: "30,10 5-9 * * 1-6"
    - cron: "30,10 14-16 * * 1-6"

env:
  # Node.js 24 compatibility for future-proofing
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get-vault-credentials:
    runs-on: ubuntu-latest
    outputs:
      credentials-file: ${{ steps.vault.outputs.file }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Vault CLI and PostgreSQL
      run: |
        wget -qO- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list > /dev/null
        sudo apt-get update -qq && sudo apt-get install -y -qq vault postgresql-client
    
    - name: Retrieve Vault Credentials (Multi-step)
      id: vault
      env:
        VAULT_ADDR: ${{ secrets.VAULT_URL }}
        SERVICE_TOKEN: ${{ secrets.SERVICE_TOKEN }}
      run: |
        # Security: Disable command echoing to prevent token exposure in logs
        set +x
        set -euo pipefail  # Fail fast on errors
        
        export VAULT_TOKEN="$SERVICE_TOKEN"
        echo "STEP 1: Getting vault tokens and credentials"
        
        # Step 1: Get ALL token from SVU vault
        # Security Note: Vault paths are obfuscated tokens, not sensitive data
        ALL_TOKEN=$(vault kv get -address="$VAULT_ADDR" -field=toc7kawoc7 -mount=hej0SESwEs cicuwrl4po 2>/dev/null) || {
            echo "::error::Failed to retrieve ALL_TOKEN from SVU vault - check token permissions"
            exit 1
        }
        if [ -z "$ALL_TOKEN" ]; then
            echo "::error::ALL_TOKEN is empty after retrieval"
            exit 1
        fi
        echo "✓ ALL token obtained"
        
        export VAULT_TOKEN="$ALL_TOKEN"
        
        # Step 2: Get app-specific tokens from ALL vault
        ITD_TEST_TOKEN=$(vault kv get -address="$VAULT_ADDR" -field=wr0swu5udi -mount=driy9s4uce je0emad4ov 2>/dev/null) || { echo "::error::Failed to get ITD_TEST_TOKEN"; exit 1; }
        ZOOM_TOKEN=$(vault kv get -address="$VAULT_ADDR" -field=v0ve2regos -mount=driy9s4uce je0emad4ov 2>/dev/null) || { echo "::error::Failed to get ZOOM_TOKEN"; exit 1; }
        AWS_ROOT_TOKEN=$(vault kv get -address="$VAULT_ADDR" -field=vepiz9pafr -mount=driy9s4uce je0emad4ov 2>/dev/null) || { echo "::error::Failed to get AWS_ROOT_TOKEN"; exit 1; }
        
        [[ -z "$ITD_TEST_TOKEN" ]] && { echo "::error::ITD_TEST_TOKEN is empty"; exit 1; }
        [[ -z "$ZOOM_TOKEN" ]] && { echo "::error::ZOOM_TOKEN is empty"; exit 1; }
        [[ -z "$AWS_ROOT_TOKEN" ]] && { echo "::error::AWS_ROOT_TOKEN is empty"; exit 1; }
        echo "✓ App tokens obtained"
        
        # Step 3: Get DB credentials from ITD_TEST vault
        export VAULT_TOKEN="$ITD_TEST_TOKEN"
        echo "STEP 2: Getting DB credentials"
        
        PGHOST=$(vault kv get -address="$VAULT_ADDR" -field=DB_HOST -mount=ql1te2icha bruxe0az6q 2>/dev/null) || { echo "::error::Failed to retrieve PGHOST"; exit 1; }
        PGPORT=$(vault kv get -address="$VAULT_ADDR" -field=DB_PORT -mount=ql1te2icha bruxe0az6q 2>/dev/null) || { echo "::error::Failed to retrieve PGPORT"; exit 1; }
        PGDATABASE=$(vault kv get -address="$VAULT_ADDR" -field=DB_NAME -mount=ql1te2icha bruxe0az6q 2>/dev/null) || { echo "::error::Failed to retrieve PGDATABASE"; exit 1; }
        PGUSER=$(vault kv get -address="$VAULT_ADDR" -field=DB_USER -mount=ql1te2icha bruxe0az6q 2>/dev/null) || { echo "::error::Failed to retrieve PGUSER"; exit 1; }
        PGPASSWORD=$(vault kv get -address="$VAULT_ADDR" -field=DB_PASSWORD -mount=ql1te2icha bruxe0az6q 2>/dev/null) || { echo "::error::Failed to retrieve PGPASSWORD"; exit 1; }
        
        [[ -z "$PGHOST" ]] && { echo "::error::PGHOST is empty"; exit 1; }
        [[ -z "$PGPORT" ]] && { echo "::error::PGPORT is empty"; exit 1; }
        [[ -z "$PGDATABASE" ]] && { echo "::error::PGDATABASE is empty"; exit 1; }
        [[ -z "$PGUSER" ]] && { echo "::error::PGUSER is empty"; exit 1; }
        [[ -z "$PGPASSWORD" ]] && { echo "::error::PGPASSWORD is empty"; exit 1; }
        echo "✓ DB credentials retrieved (password length: ${#PGPASSWORD})"
        
        # Test DB connection
        echo "Testing DB connection..."
        if PGPASSWORD="$PGPASSWORD" psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -c "SELECT 1;" > /dev/null 2>&1; then
            echo "✓ DB connection successful"
        else
            echo "::error::Database connection failed - verify credentials and network access"
            exit 1
        fi
        
        # Step 4: Get AWS credentials from AWS_ROOT vault
        # Security Note: Consider migrating to OIDC for temporary credentials
        export VAULT_TOKEN="$AWS_ROOT_TOKEN"
        echo "STEP 3: Getting AWS credentials"
        
        AWS_ACCESS_KEY_ID=$(vault kv get -address="$VAULT_ADDR" -field=thujostav9 -mount=yi6pobrath s7ohebu2ho 2>/dev/null) || { echo "::error::Failed to retrieve AWS_ACCESS_KEY_ID"; exit 1; }
        AWS_SECRET_ACCESS_KEY=$(vault kv get -address="$VAULT_ADDR" -field=yuru9ibruw -mount=yi6pobrath s7ohebu2ho 2>/dev/null) || { echo "::error::Failed to retrieve AWS_SECRET_ACCESS_KEY"; exit 1; }
        AWS_DEFAULT_REGION=ap-south-1
        
        [[ -z "$AWS_ACCESS_KEY_ID" ]] && { echo "::error::AWS_ACCESS_KEY_ID is empty"; exit 1; }
        [[ -z "$AWS_SECRET_ACCESS_KEY" ]] && { echo "::error::AWS_SECRET_ACCESS_KEY is empty"; exit 1; }
        echo "✓ AWS credentials retrieved"
        
        # Step 5: Get Vimeo credentials from ITD_TEST vault
        export VAULT_TOKEN="$ITD_TEST_TOKEN"
        echo "STEP 4: Getting Vimeo credentials"
        
        VIMEO_ACCESS_TOKEN=$(vault kv get -address="$VAULT_ADDR" -field=VIMEO_ACCESS_TOKEN -mount=ql1te2icha bruxe0az6q 2>/dev/null) || { echo "::error::Failed to retrieve VIMEO_ACCESS_TOKEN"; exit 1; }
        VIMEO_CLIENT_ID=$(vault kv get -address="$VAULT_ADDR" -field=VIMEO_CLIENT_ID -mount=ql1te2icha bruxe0az6q 2>/dev/null) || { echo "::error::Failed to retrieve VIMEO_CLIENT_ID"; exit 1; }
        VIMEO_CLIENT_SECRET=$(vault kv get -address="$VAULT_ADDR" -field=VIMEO_CLIENT_SECRET -mount=ql1te2icha bruxe0az6q 2>/dev/null) || { echo "::error::Failed to retrieve VIMEO_CLIENT_SECRET"; exit 1; }
        
        [[ -z "$VIMEO_ACCESS_TOKEN" ]] && { echo "::error::VIMEO_ACCESS_TOKEN is empty"; exit 1; }
        [[ -z "$VIMEO_CLIENT_ID" ]] && { echo "::error::VIMEO_CLIENT_ID is empty"; exit 1; }
        [[ -z "$VIMEO_CLIENT_SECRET" ]] && { echo "::error::VIMEO_CLIENT_SECRET is empty"; exit 1; }
        echo "✓ Vimeo credentials retrieved"
        
        # Step 6: Get Zoom credentials from ZOOM vault
        export VAULT_TOKEN="$ZOOM_TOKEN"
        echo "STEP 5: Getting Zoom credentials"
        
        Z1_AI=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_ACCOUNT_ID_ORG1 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z1_AI"; exit 1; }
        Z1_CI=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_CLIENT_ID_ORG1 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z1_CI"; exit 1; }
        Z1_CS=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_CLIENT_SECRET_ORG1 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z1_CS"; exit 1; }
        Z2_AI=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_ACCOUNT_ID_ORG2 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z2_AI"; exit 1; }
        Z2_CI=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_CLIENT_ID_ORG2 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z2_CI"; exit 1; }
        Z2_CS=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_CLIENT_SECRET_ORG2 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z2_CS"; exit 1; }
        Z4_AI=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_ACCOUNT_ID_ORG4 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z4_AI"; exit 1; }
        Z4_CI=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_CLIENT_ID_ORG4 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z4_CI"; exit 1; }
        Z4_CS=$(vault kv get -address="$VAULT_ADDR" -field=ZOOM_CLIENT_SECRET_ORG4 -mount=t1lrophebr sestip6ecu 2>/dev/null) || { echo "::error::Failed to retrieve Z4_CS"; exit 1; }
        
        [[ -z "$Z1_AI" ]] && { echo "::error::Z1_AI is empty"; exit 1; }
        [[ -z "$Z2_AI" ]] && { echo "::error::Z2_AI is empty"; exit 1; }
        [[ -z "$Z4_AI" ]] && { echo "::error::Z4_AI is empty"; exit 1; }
        echo "✓ Zoom credentials retrieved"
        
        # Save credentials to encrypted file using proper escaping
        # Security: File is in RUNNER_TEMP (tmpfs), encrypted by GitHub, deleted after use
        CREDS_FILE="${RUNNER_TEMP}/vault_creds_${GITHUB_RUN_ID}.env"
        {
            echo "export PGHOST=$(printf %q "$PGHOST")"
            echo "export PGPORT=$(printf %q "$PGPORT")"
            echo "export PGDATABASE=$(printf %q "$PGDATABASE")"
            echo "export PGUSER=$(printf %q "$PGUSER")"
            echo "export PGPASSWORD=$(printf %q "$PGPASSWORD")"
            echo "export AWS_ACCESS_KEY_ID=$(printf %q "$AWS_ACCESS_KEY_ID")"
            echo "export AWS_SECRET_ACCESS_KEY=$(printf %q "$AWS_SECRET_ACCESS_KEY")"
            echo "export AWS_DEFAULT_REGION=$(printf %q "$AWS_DEFAULT_REGION")"
            echo "export VIMEO_ACCESS_TOKEN=$(printf %q "$VIMEO_ACCESS_TOKEN")"
            echo "export VIMEO_CLIENT_ID=$(printf %q "$VIMEO_CLIENT_ID")"
            echo "export VIMEO_CLIENT_SECRET=$(printf %q "$VIMEO_CLIENT_SECRET")"
            echo "export Z1_AI=$(printf %q "$Z1_AI")"
            echo "export Z1_CI=$(printf %q "$Z1_CI")"
            echo "export Z1_CS=$(printf %q "$Z1_CS")"
            echo "export Z2_AI=$(printf %q "$Z2_AI")"
            echo "export Z2_CI=$(printf %q "$Z2_CI")"
            echo "export Z2_CS=$(printf %q "$Z2_CS")"
            echo "export Z4_AI=$(printf %q "$Z4_AI")"
            echo "export Z4_CI=$(printf %q "$Z4_CI")"
            echo "export Z4_CS=$(printf %q "$Z4_CS")"
        } > "$CREDS_FILE"
        
        chmod 600 "$CREDS_FILE"
        echo "✓ Credentials saved to $CREDS_FILE with proper escaping"
        echo "file=$CREDS_FILE" >> $GITHUB_OUTPUT
        
        # Security: Unset sensitive variables
        unset VAULT_TOKEN SERVICE_TOKEN ALL_TOKEN ITD_TEST_TOKEN ZOOM_TOKEN AWS_ROOT_TOKEN
        unset PGPASSWORD AWS_SECRET_ACCESS_KEY VIMEO_ACCESS_TOKEN VIMEO_CLIENT_SECRET
        unset Z1_CS Z2_CS Z4_CS
    
    - name: Upload credentials as artifact (encrypted by GitHub)
      uses: actions/upload-artifact@v4
      with:
        name: vault-credentials-${{ github.run_id }}
        path: ${{ steps.vault.outputs.file }}
        retention-days: 1
    
    - name: Cleanup local credential file
      if: always()
      run: |
        CREDS_FILE="${RUNNER_TEMP}/vault_creds_${GITHUB_RUN_ID}.env"
        shred -vfz -n 3 "$CREDS_FILE" 2>/dev/null || rm -f "$CREDS_FILE"

  prepare-matrix:
    needs: get-vault-credentials
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: devopscalendar101/wv_source
          token: ${{ secrets.PAT }}
          path: wv_source
      
      - name: Generate matrix from batch config
        id: set-matrix
        run: |
          CONFIG=$(cat wv_source/conf/config.json)
          BATCHES=$(echo "$CONFIG" | jq -c '[.batches[] | select(.enabled == true)]')
          
          if [ -n "${{ github.event.inputs.class_date_list }}" ]; then
            CLASS_DATES="${{ github.event.inputs.class_date_list }}"
          else
            CLASS_DATES=$(date -u +%Y%m%d)
          fi
          
          MATRIX=$(jq -n -c \
            --argjson batches "$BATCHES" \
            --arg dates "$CLASS_DATES" \
            '{
              include: [
                $batches[] as $batch |
                ($dates | split(",") | .[] | gsub("^\\s+|\\s+$";"")) as $date |
                {
                  batch_name: $batch.batch_name,
                  course_id: $batch.course_id,
                  itd_zoom_id: $batch.itd_zoom_id,
                  batch_id: $batch.batch_id,
                  zoom_id: $batch.zoom_id,
                  zoom_account: $batch.zoom_account,
                  parent_topic: $batch.parent_topic,
                  class_date: $date
                }
              ]
            }')
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Generated matrix (compact):"
          echo "$MATRIX"
          echo ""
          echo "Generated matrix (pretty):"
          echo "$MATRIX" | jq .

  process-videos:
    needs: [get-vault-credentials, prepare-matrix]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    
    name: "${{ matrix.batch_name }}_${{ matrix.class_date }}"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Checkout private source repo
      uses: actions/checkout@v4
      with:
        repository: devopscalendar101/wv_source
        token: ${{ secrets.PAT }}
        path: wv_source
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ hashFiles('wv_source/conf/requirements.txt') }}
    
    - name: System Info
      run: |
        echo "┌──────────────────────────────────────────┐"
        echo "│           RUNNER SYSTEM INFO              │"
        echo "├──────────────────────────────────────────┤"
        printf "│ %-40s │\n" "OS: $(lsb_release -ds 2>/dev/null || cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"')"
        printf "│ %-40s │\n" "KERNEL: $(uname -r)"
        printf "│ %-40s │\n" "CPU: $(lscpu | grep 'Model name' | sed 's/Model name:\s*//')"
        printf "│ %-40s │\n" "CPU_CORES: $(nproc) cores"
        printf "│ %-40s │\n" "MEMORY: $(free -h | awk '/Mem:/{print $2}') total"
        printf "│ %-40s │\n" "STORAGE: $(df -h / | awk 'NR==2{print $4}') available / $(df -h / | awk 'NR==2{print $2}') total"
        echo "├──────────────────────────────────────────┤"
        printf "│ %-40s │\n" "BATCH: ${{ matrix.batch_name }}"
        printf "│ %-40s │\n" "DATE: ${{ matrix.class_date }}"
        echo "└──────────────────────────────────────────┘"
    
    - name: Setup Environment
      run: |
        chmod +x wv_source/bin/bootstrap.sh
        wv_source/bin/bootstrap.sh install
        python3 -m pip install --upgrade pip -q
        python3 -m pip install -r wv_source/conf/requirements.txt -q
        chmod +x wv_source/bin/*
    
    - name: Download Vault credentials
      uses: actions/download-artifact@v4
      with:
        name: vault-credentials-${{ github.run_id }}
        path: ${{ runner.temp }}
    
    - name: Load credentials and verify
      run: |
        CREDS_FILE="${RUNNER_TEMP}/vault_creds_${GITHUB_RUN_ID}.env"
        
        if [ ! -f "$CREDS_FILE" ]; then
          echo "::error::Credentials file not found: $CREDS_FILE"
          exit 1
        fi
        
        # Security: Verify file permissions
        if [ "$(stat -c %a "$CREDS_FILE" 2>/dev/null || stat -f %A "$CREDS_FILE")" != "600" ]; then
          chmod 600 "$CREDS_FILE"
        fi
        
        # Source credentials (shell interprets printf %q escaping)
        source "$CREDS_FILE"
        
        # Verify DB connection
        echo "Testing database connection..."
        psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -c "SELECT 1;" > /dev/null 2>&1 || {
          echo "::error::Database connection failed - check credentials and network"
          exit 1
        }
        echo "✓ Database connection successful"
        
        # Export raw values to GITHUB_ENV (no shell escaping)
        {
          echo "PGHOST=$PGHOST"
          echo "PGPORT=$PGPORT"
          echo "PGDATABASE=$PGDATABASE"
          echo "PGUSER=$PGUSER"
          echo "PGPASSWORD=$PGPASSWORD"
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
          echo "VIMEO_ACCESS_TOKEN=$VIMEO_ACCESS_TOKEN"
          echo "VIMEO_CLIENT_ID=$VIMEO_CLIENT_ID"
          echo "VIMEO_CLIENT_SECRET=$VIMEO_CLIENT_SECRET"
          echo "Z1_AI=$Z1_AI"
          echo "Z1_CI=$Z1_CI"
          echo "Z1_CS=$Z1_CS"
          echo "Z2_AI=$Z2_AI"
          echo "Z2_CI=$Z2_CI"
          echo "Z2_CS=$Z2_CS"
          echo "Z4_AI=$Z4_AI"
          echo "Z4_CI=$Z4_CI"
          echo "Z4_CS=$Z4_CS"
          echo "ITD_TOKEN=${{ secrets.ITD_TOKEN }}"
        } >> $GITHUB_ENV
    
    - name: Download watermark assets from S3
      run: |
        WM_DIR="$HOME/.watermark-assets"
        mkdir -p "$WM_DIR"
        echo "Downloading watermark assets from S3..."
        aws s3 cp s3://class-recordings-itdefined/watermark-assets/ "$WM_DIR/" --recursive --quiet
        echo "Assets downloaded:"
        ls -lh "$WM_DIR/"
        echo "WM_PATH=$WM_DIR" >> $GITHUB_ENV
        echo "PATH=$GITHUB_WORKSPACE/wv_source/bin:$PATH" >> $GITHUB_ENV

    - name: Set Zoom Email from Account
      id: zoom-email
      run: |
        # Map zoom_account to email
        case "${{ matrix.zoom_account }}" in
          Z1) ZOOM_EMAIL="itdefined.org@gmail.com" ;;
          Z2) ZOOM_EMAIL="itdefined.org2@gmail.com" ;;
          Z3) ZOOM_EMAIL="itdefined.org3@gmail.com" ;;
          Z4) ZOOM_EMAIL="itdefined.org4@gmail.com" ;;
          *) ZOOM_EMAIL="unknown@gmail.com" ;;
        esac
        echo "zoom_email=$ZOOM_EMAIL" >> $GITHUB_OUTPUT
        echo "Using zoom email: $ZOOM_EMAIL"
    
    - name: Generate topic from date
      id: topic
      run: |
        DATE="${{ matrix.class_date }}"
        YEAR="${DATE:0:4}"
        MONTH="${DATE:4:2}"
        DAY="${DATE:6:2}"
        TOPIC="Topic ${YEAR}-${MONTH}-${DAY}"
        echo "topic=$TOPIC" >> $GITHUB_OUTPUT
    
    - name: Pipeline Options Check
      run: |
        S3_DEL_ORIG="${{ github.event.inputs.s3_delete_original || 'false' }}"
        S3_DEL_WM="${{ github.event.inputs.s3_delete_watermark || 'false' }}"
        VEMIO_DEL="${{ github.event.inputs.vemio_delete || 'false' }}"
        USE_S3="${{ github.event.inputs.use_s3_original || 'false' }}"
        DEL_ATT="${{ github.event.inputs.delete_attendance || 'false' }}"

        icon() { [[ "$1" == "true" ]] && echo "🟢 ON" || echo "⚪ OFF"; }

        echo "┌──────────────────────────────────────────────┐"
        echo "│            PIPELINE OPTIONS                   │"
        echo "├──────────────────────────────────────────────┤"
        printf "│  %-6s  %-36s │\n" "$(icon $USE_S3)" "use_s3_original (skip Zoom, use S3)"
        echo "├──────────────────────────────────────────────┤"
        printf "│  %-6s  %-36s │\n" "$(icon $S3_DEL_ORIG)" "s3_delete_original (re-download)"
        printf "│  %-6s  %-36s │\n" "$(icon $S3_DEL_WM)" "s3_delete_watermark (re-watermark)"
        printf "│  %-6s  %-36s │\n" "$(icon $VEMIO_DEL)" "vemio_delete (re-upload to Vimeo)"
        printf "│  %-6s  %-36s │\n" "$(icon $DEL_ATT)" "delete_attendance (re-fetch)"
        echo "└──────────────────────────────────────────────┘"

        # Warn about destructive combos
        ACTIVE=0
        [[ "$S3_DEL_ORIG" == "true" ]] && ACTIVE=$((ACTIVE+1))
        [[ "$S3_DEL_WM" == "true" ]] && ACTIVE=$((ACTIVE+1))
        [[ "$VEMIO_DEL" == "true" ]] && ACTIVE=$((ACTIVE+1))
        [[ "$DEL_ATT" == "true" ]] && ACTIVE=$((ACTIVE+1))

        if [[ $ACTIVE -ge 3 ]]; then
          echo "::warning::⚠️ $ACTIVE delete flags active — this will re-process most of the pipeline"
        fi
        if [[ "$S3_DEL_ORIG" == "true" && "$USE_S3" == "true" ]]; then
          echo "::warning::⚠️ s3_delete_original + use_s3_original both ON — will delete then try to download from same bucket!"
        fi

    - name: Run Watermark Video Pipeline
      id: pipeline
      run: |
        set +e
        wv_source/bin/watermark_pipeline.sh \
          "class-recordings-itdefined" \
          "${{ matrix.batch_name }}" \
          "${{ matrix.itd_zoom_id }}" \
          "${{ matrix.zoom_account }}" \
          "${{ steps.topic.outputs.topic }}" \
          "${{ matrix.course_id }}" \
          "${{ matrix.batch_id }}" \
          "${{ matrix.parent_topic }}" \
          "${{ matrix.zoom_id }}" \
          "${{ steps.zoom-email.outputs.zoom_email }}" \
          "${{ matrix.class_date }}" \
          "${{ github.event.inputs.s3_delete_original || 'false' }}" \
          "${{ github.event.inputs.delete_attendance || 'false' }}" \
          "${{ github.event.inputs.delete_class || 'false' }}" \
          "${{ github.event.inputs.s3_delete_watermark || 'false' }}" \
          "${{ github.event.inputs.use_s3_original || 'false' }}" \
          "$VIMEO_ACCESS_TOKEN" \
          "$VIMEO_CLIENT_ID" \
          "$VIMEO_CLIENT_SECRET" \
          "${{ github.event.inputs.vemio_delete || 'false' }}"
        PIPELINE_EXIT=$?
        if [ $PIPELINE_EXIT -eq 2 ]; then
          echo "::warning::No video available for ${{ matrix.batch_name }} on ${{ matrix.class_date }} (no class or Zoom still processing)"
          echo "status=warning" >> $GITHUB_OUTPUT
        elif [ $PIPELINE_EXIT -ne 0 ]; then
          echo "::error::Pipeline failed for ${{ matrix.batch_name }} on ${{ matrix.class_date }}"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "status=success" >> $GITHUB_OUTPUT
        fi
    
    - name: Upload artifacts (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.batch_name }}-${{ matrix.class_date }}
        path: |
          ~/.tmp/${{ matrix.batch_name }}/*.log
          ~/.tmp/${{ matrix.batch_name }}/*.txt
        retention-days: 7
        if-no-files-found: ignore
    
    - name: Cleanup local videos
      if: always()
      run: rm -rf ~/.tmp/${{ matrix.batch_name }}/*.mp4 || true
    
    - name: Cleanup credentials
      if: always()
      run: |
        # Security: Securely delete credential file
        CREDS_FILE="${RUNNER_TEMP}/vault_creds_${GITHUB_RUN_ID}.env"
        shred -vfz -n 3 "$CREDS_FILE" 2>/dev/null || rm -f "$CREDS_FILE" || true

  cleanup-credentials:
    needs: [get-vault-credentials, process-videos]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Delete credentials artifact
      uses: geekyeggo/delete-artifact@v5
      with:
        name: vault-credentials-${{ github.run_id }}
        failOnError: false
